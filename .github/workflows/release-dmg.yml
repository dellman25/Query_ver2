name: Build macOS DMG

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-macos:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .app
        run: |
          chmod +x scripts/build_macos_app.sh
          ./scripts/build_macos_app.sh

      - name: Build DMG
        run: |
          chmod +x scripts/make_dmg.sh
          ./scripts/make_dmg.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OnTheSpot-dmg
          path: dist/OnTheSpot.dmg

      - name: Attach DMG to Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} dist/OnTheSpot.dmg --clobber
